---
- hosts: localhost
  connection: local
  gather_facts: no

  vars_files:
    - vars/main.yml

  tasks:

  # -------------------------
  # Create VPC
  # -------------------------
  - name: Create VPC
    ec2_vpc_net:
      name: "{{ vpc_name }}"
      cidr_block: "{{ vpcCidr }}"
      region: "{{ region }}"
      state: "{{ state }}"
    register: vpcout

  # -------------------------
  # Create Public Subnets
  # -------------------------
  - name: Create Public Subnet 1 in Zone1
    ec2_vpc_subnet:
      vpc_id: "{{ vpcout.vpc.id }}"
      region: "{{ region }}"
      az: "{{ zone1 }}"
      state: "{{ state }}"
      cidr: "{{ PubSub1Cidr }}"
      map_public: yes
      tags:
        Name: vprofile-pubsub1
    register: pubsub1_out

  - name: Create Public Subnet 2 in Zone2
    ec2_vpc_subnet:
      vpc_id: "{{ vpcout.vpc.id }}"
      region: "{{ region }}"
      az: "{{ zone2 }}"
      state: "{{ state }}"
      cidr: "{{ PubSub2Cidr }}"
      map_public: yes
      tags:
        Name: vprofile-pubsub2
    register: pubsub2_out

  - name: Create Public Subnet 3 in Zone3
    ec2_vpc_subnet:
      vpc_id: "{{ vpcout.vpc.id }}"
      region: "{{ region }}"
      az: "{{ zone3 }}"
      state: "{{ state }}"
      cidr: "{{ PubSub3Cidr }}"
      map_public: yes
      tags:
        Name: vprofile-pubsub3
    register: pubsub3_out

  # -------------------------
  # Create Private Subnets
  # -------------------------
  - name: Create Private Subnet 1 in Zone1
    ec2_vpc_subnet:
      vpc_id: "{{ vpcout.vpc.id }}"
      region: "{{ region }}"
      az: "{{ zone1 }}"
      state: "{{ state }}"
      cidr: "{{ PrivSub1Cidr }}"
      map_public: no
      tags:
        Name: vprofile-privsub1
    register: privsub1_out

  - name: Create Private Subnet 2 in Zone2
    ec2_vpc_subnet:
      vpc_id: "{{ vpcout.vpc.id }}"
      region: "{{ region }}"
      az: "{{ zone2 }}"
      state: "{{ state }}"
      cidr: "{{ PrivSub2Cidr }}"
      map_public: no
      tags:
        Name: vprofile-privsub2
    register: privsub2_out

  - name: Create Private Subnet 3 in Zone3
    ec2_vpc_subnet:
      vpc_id: "{{ vpcout.vpc.id }}"
      region: "{{ region }}"
      az: "{{ zone3 }}"
      state: "{{ state }}"
      cidr: "{{ PrivSub3Cidr }}"
      map_public: no
      tags:
        Name: vprofile-privsub3
    register: privsub3_out

  # -------------------------
  # Internet Gateway
  # -------------------------
  - name: Create Internet Gateway
    ec2_vpc_igw:
      vpc_id: "{{ vpcout.vpc.id }}"
      region: "{{ region }}"
      state: "{{ state }}"
    register: igw_out

  # -------------------------
  # Public Route Table
  # -------------------------
  - name: Create Public Route Table
    ec2_vpc_route_table:
      vpc_id: "{{ vpcout.vpc.id }}"
      region: "{{ region }}"
      tags:
        Name: vprofile-pub-rt
      subnets:
        - "{{ pubsub1_out.subnet.id }}"
        - "{{ pubsub2_out.subnet.id }}"
        - "{{ pubsub3_out.subnet.id }}"
      routes:
        - dest: 0.0.0.0/0
          gateway_id: "{{ igw_out.gateway_id }}"
      state: "{{ state }}"
    register: pubRT_out

  # -------------------------
  # Allocate EIP for NAT1
  # -------------------------
  - name: Allocate EIP for NAT1
    ec2_eip:
      region: "{{ region }}"
      state: present
    register: eip1_out

  # -------------------------
  # NAT Gateway 1
  # -------------------------
  - name: Create NAT Gateway 1
    ec2_vpc_nat_gateway:
      subnet_id: "{{ pubsub1_out.subnet.id }}"
      allocation_id: "{{ eip1_out.allocation_id }}"
      region: "{{ region }}"
      state: present
    register: natgw1_out

  # -------------------------
  # Private Route Table 1
  # -------------------------
  - name: Create Private Route Table 1
    ec2_vpc_route_table:
      vpc_id: "{{ vpcout.vpc.id }}"
      region: "{{ region }}"
      tags:
        Name: vprofile-priv-rt1
      subnets:
        - "{{ privsub1_out.subnet.id }}"
      routes:
        - dest: 0.0.0.0/0
          nat_gateway_id: "{{ natgw1_out.nat_gateway_id }}"
      state: "{{ state }}"
    register: privRT1_out

  # -------------------------
  # DEBUG LOOP (AS IN PDF)
  # -------------------------
  - debug:
      var: "{{ item }}"
    loop:
      - vpcout.vpc.id
      - pubsub1_out.subnet.id
      - pubsub2_out.subnet.id
      - pubsub3_out.subnet.id
      - privsub1_out.subnet.id
      - privsub2_out.subnet.id
      - privsub3_out.subnet.id
      - igw_out.gateway_id
      - pubRT_out.route_table.id
      - natgw1_out.nat_gateway_id
      - privRT1_out.route_table.id

  # -------------------------
  # Set Facts
  # -------------------------
  - set_fact:
      vpcid: "{{ vpcout.vpc.id }}"
      pubsub1id: "{{ pubsub1_out.subnet.id }}"
      pubsub2id: "{{ pubsub2_out.subnet.id }}"
      pubsub3id: "{{ pubsub3_out.subnet.id }}"
      privsub1id: "{{ privsub1_out.subnet.id }}"
      privsub2id: "{{ privsub2_out.subnet.id }}"
      privsub3id: "{{ privsub3_out.subnet.id }}"
      igwid: "{{ igw_out.gateway_id }}"
      pubRTid: "{{ pubRT_out.route_table.id }}"
      natgw1id: "{{ natgw1_out.nat_gateway_id }}"
      privRT1id: "{{ privRT1_out.route_table.id }}"
      cacheable: yes

  # -------------------------
  # Create Output File
  # -------------------------
  - name: Create variables file for vpc Output
    copy:
      content: |
        vpcid: {{ vpcid }}
        pubsub1id: {{ pubsub1id }}
        pubsub2id: {{ pubsub2id }}
        pubsub3id: {{ pubsub3id }}
        privsub1id: {{ privsub1id }}
        privsub2id: {{ privsub2id }}
        privsub3id: {{ privsub3id }}
        igwid: {{ igwid }}
        pubRTid: {{ pubRTid }}
        natgw1id: {{ natgw1id }}
        privRT1id: {{ privRT1id }}
      dest: vars/output_vars
