---
- hosts: localhost
  connection: local
  gather_facts: no

  vars_files:
    - vars/vpc_setup

  tasks:

    - name: Create VPC
      ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ vpcCidr }}"
        region: "{{ region }}"
        state: "{{ state }}"
      register: vpc_out

    - name: Create Public Subnet 1
      ec2_vpc_subnet:
        vpc_id: "{{ vpc_out.vpc.id }}"
        cidr: "{{ PubSub1Cidr }}"
        az: "{{ zone1 }}"
        region: "{{ region }}"
        state: "{{ state }}"
      register: pubsub1_out

    - name: Create Public Subnet 2
      ec2_vpc_subnet:
        vpc_id: "{{ vpc_out.vpc.id }}"
        cidr: "{{ PubSub2Cidr }}"
        az: "{{ zone2 }}"
        region: "{{ region }}"
        state: "{{ state }}"
      register: pubsub2_out

    - name: Create Public Subnet 3
      ec2_vpc_subnet:
        vpc_id: "{{ vpc_out.vpc.id }}"
        cidr: "{{ PubSub3Cidr }}"
        az: "{{ zone3 }}"
        region: "{{ region }}"
        state: "{{ state }}"
      register: pubsub3_out

    - name: Create Private Subnet 1
      ec2_vpc_subnet:
        vpc_id: "{{ vpc_out.vpc.id }}"
        cidr: "{{ PrivSub1Cidr }}"
        az: "{{ zone1 }}"
        region: "{{ region }}"
        state: "{{ state }}"
      register: privsub1_out

    - name: Create Private Subnet 2
      ec2_vpc_subnet:
        vpc_id: "{{ vpc_out.vpc.id }}"
        cidr: "{{ PrivSub2Cidr }}"
        az: "{{ zone2 }}"
        region: "{{ region }}"
        state: "{{ state }}"
      register: privsub2_out

    - name: Create Private Subnet 3
      ec2_vpc_subnet:
        vpc_id: "{{ vpc_out.vpc.id }}"
        cidr: "{{ PrivSub3Cidr }}"
        az: "{{ zone3 }}"
        region: "{{ region }}"
        state: "{{ state }}"
      register: privsub3_out